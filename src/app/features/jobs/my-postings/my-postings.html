<section class="stack-lg">

	<header class="stack-xs">
		<h1>{{ 'jobs.sections.my_postings' | t }}</h1>
		<p class="text-soft">
			{{ 'jobs.sections.my_postings_subtitle' | t }}
		</p>
	</header>

	@if (loading()) {
		<app-spinner
			[label]="'jobs.messages.loading' | t">
		</app-spinner>
	}

	@if (apiErrorMessage()) {
		<app-alert-error
			[message]="apiErrorMessage()">
		</app-alert-error>
	}

	@if (!loading()) {

		@if (jobs().length > 0) {

			<app-job-list
				[jobs]="jobs()"
				[actionLabelResolver]="actionLabelResolver"
				[actionClassResolver]="actionClassResolver"
				[actionDisabledResolver]="actionDisabledResolver"
				[actionTitleResolver]="actionTitleResolver"
				[actionLoadingId]="actionLoadingJobId()"
				(action)="askJobAction($event)"
				(jobClick)="openJob($event)">
			</app-job-list>

		} @else {

			<app-empty-state
				[title]="'jobs.messages.no_results' | t"
				[message]="'jobs.messages.no_results' | t">
			</app-empty-state>

		}

	}

</section>

@if (selectedJobId()) {
	<app-modal (close)="closeJob()">
		<app-job-details
			[jobId]="selectedJobId()!"
			(close)="closeJob()"
			(refreshed)="handleJobRefresh($event)">
		</app-job-details>
	</app-modal>
}

@if (pendingCompleteJob()) {
	<app-confirm-dialog
		[title]="'jobs.complete.confirm_title' | t"
		[message]="'jobs.complete.confirm_message' | t"
		(confirm)="confirmAction()"
		(cancel)="clearPendingAction()">
	</app-confirm-dialog>
}

@if (reviewDraft(); as draft) {
	<app-review-submit
		[jobId]="draft.jobId"
		[targetId]="draft.targetId"
		[targetLabel]="draft.targetLabel"
		(submitted)="handleReviewSubmitted()"
		(close)="clearReviewDraft()">
	</app-review-submit>
}
