<section class="stack-lg">

  <header class="stack-xs">
    <h1>{{ 'proposals.title' | t }}</h1>
    <p class="text-soft">
      {{ 'proposals.subtitle' | t }}
    </p>
  </header>

  @if (loading()) {
    <app-spinner
      [label]="'proposals.loading' | t">
    </app-spinner>
  }

  @if (apiErrorMessage()) {
    <app-alert-error
      [message]="apiErrorMessage()">
    </app-alert-error>
  }

  @if (!loading()) {

    @if (bids().length > 0) {

      <app-job-proposals
        [proposals]="bids()"
        [currentUserId]="currentUser()?.id ?? 0"
        [currentUsername]="currentUser()?.username ?? ''"
        [actionLabelResolver]="actionLabelResolver"
        [actionClassResolver]="actionClassResolver"
        [actionLoading]="actionLoading()"
        (action)="askProposalAction($event)"
        (jobClick)="openJob($event)">
      </app-job-proposals>

    } @else {

      <app-empty-state
        [title]="'proposals.empty_title' | t"
        [message]="'proposals.empty_message' | t">
      </app-empty-state>

    }

  }

</section>

@if (selectedJobId()) {
  <app-modal (close)="closeJob()">
    <app-job-details
      [jobId]="selectedJobId()!"
      (close)="closeJob()">
    </app-job-details>
  </app-modal>
}

@if (reviewDraft(); as draft) {
  <app-review-submit
    [jobId]="draft.jobId"
    [targetId]="draft.targetId"
    [targetLabel]="draft.targetLabel"
    (submitted)="handleReviewSubmitted()"
    (close)="clearReviewDraft()">
  </app-review-submit>
}

@if (pendingAction()) {

  <app-confirm-dialog
    [title]="confirmTitle()"
    [message]="confirmMessage()"
    (confirm)="confirmAction()"
    (cancel)="clearPendingAction()">
  </app-confirm-dialog>

}
